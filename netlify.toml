# DMCAShield Netlify Config - Updated May 3, 2025
[build]
  command = "npm run build"
  publish = "dist"
  directory = "dist"

[build.environment]
  VITE_API_URL = "https://dmcashield-agency.vercel.app"
  VITE_PROD = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.Cache-Control]
    value = "no-cache"